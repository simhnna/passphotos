<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Biometrische Bilder - 404</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png" />
  <link rel="manifest" href="/assets/favicon/site.webmanifest" />

  <style>
    .error-container {
      text-align: center;
      padding: 48px 24px;
    }

    .error-code {
      font-size: 4rem;
      font-weight: 700;
      color: var(--color-teal);
      margin: 0 0 16px;
      letter-spacing: -0.02em;
    }

    .error-message {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--color-blue);
      margin: 0 0 24px;
    }

    .error-description {
      font-size: 0.9375rem;
      color: var(--color-text-muted);
      margin: 0 0 32px;
      line-height: 1.55;
    }

    .error-action {
      display: inline-block;
    }

    @media (prefers-color-scheme: dark) {
      .error-message {
        color: #e8f4f6;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <a href="/" style="color: inherit; text-decoration: none;">
        <h1>Biometrische Bilder erstellen</h1>
      </a>
    </div>
  </header>
  <main>
    <div class="error-container">
      <div class="error-code">404</div>
      <div class="error-message">Seite nicht gefunden</div>
      <p class="error-description">
        Die angeforderte Seite existiert nicht. Kehre zur Startseite zurück.
      </p>
      <a href="/" class="btn error-action">Zur Startseite</a>
    </div>
  </main>
  <footer>
    <a href="/">Home</a> |
    <a href="/licence.html">Lizenzen</a>
  </footer>
</body>

</html>
